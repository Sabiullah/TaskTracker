repos:
  # ── General ────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: tsconfig.*\.json$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Python: Ruff (lint + format) ───────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Python: Django system checks ──────────────────────────────────────────
  - repo: local
    hooks:
      - id: django-check
        name: Django system check
        language: node
        entry: node scripts/django-check.js
        pass_filenames: false
        always_run: true

  # ── React / TypeScript: ESLint ─────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (TypeScript/React)
        language: node
        entry: node scripts/eslint-check.js
        pass_filenames: false
        types_or: [ts, tsx]

  # ── React / TypeScript: tsc type-check ────────────────────────────────────
  - repo: local
    hooks:
      - id: tsc
        name: TypeScript type check
        language: node
        entry: node scripts/tsc-check.js
        pass_filenames: false
        types_or: [ts, tsx]
