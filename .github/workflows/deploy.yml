name: CI / Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Stage 1: Lint & type-check ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-only-placeholder-not-a-real-secret
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: sqlite:///ci.sqlite3
      CORS_ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy .

      - name: pyright
        run: uv run pyright

      - name: Django system check
        run: uv run python manage.py check

      - name: Django migrations up-to-date
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/task-tracker/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend/task-tracker

      - name: ESLint
        run: npm run lint -- --max-warnings=0
        working-directory: frontend/task-tracker

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: frontend/task-tracker

      - name: Vitest
        run: npm test
        working-directory: frontend/task-tracker

  # ── Stage 2: Deploy (lean — assumes VPS is already provisioned) ───────────
  # Prerequisites on the VPS (installed via provision.yml):
  #   - Docker + docker compose
  #   - Repo cloned at $APP_DIR
  #   - .env present at $APP_DIR/.env
  #   - Host nginx configured (deploy/nginx.conf.example)
  #   - Cron job installed (deploy/crontab.example)
  #
  # If any prerequisite is missing, run provision.yml first.
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_DIR
          script: |
            set -e

            cd "$APP_DIR"

            # ── Fetch latest code ──────────────────────────────────────────
            git fetch --all --prune
            git reset --hard origin/main

            # ── Rebuild image + restart containers ─────────────────────────
            # --no-deps on app avoids bouncing postgres/redis.
            docker compose build app
            docker compose up -d --no-deps --force-recreate app
            docker compose up -d postgres redis

            # ── Wait for health ────────────────────────────────────────────
            for i in $(seq 1 30); do
              if docker compose ps app --format json | grep -q '"Health":"healthy"'; then
                echo "App container healthy"
                break
              fi
              echo "Waiting for app... ($i/30)"
              sleep 2
            done

            # ── Reload host nginx (picks up any new static paths) ──────────
            sudo systemctl reload nginx || echo "nginx reload skipped"

            # ── Show final status ──────────────────────────────────────────
            docker compose ps
