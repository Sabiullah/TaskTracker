name: CI / Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ghcr.io/<owner>/<repo>

jobs:
  # ── Stage 1: Lint & type-check ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-only-placeholder-not-a-real-secret
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: sqlite:///ci.sqlite3
      CORS_ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy .

      - name: pyright
        run: uv run pyright

      - name: Django system check
        run: uv run python manage.py check

      - name: Django migrations up-to-date
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/task-tracker/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend/task-tracker

      - name: ESLint
        run: npm run lint -- --max-warnings=0
        working-directory: frontend/task-tracker

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: frontend/task-tracker

      - name: Vitest
        run: npm test
        working-directory: frontend/task-tracker

  # ── Stage 2: Build image & push to GHCR ───────────────────────────────────
  # Image contains the built React frontend (stage 1 of Dockerfile) plus the
  # Django app with collected static files. Tagged with both `:latest` and
  # `:<git-sha>` so the deploy step can pin the exact revision and we can
  # roll back to any previous SHA.
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Deploy (lean — just pull + restart) ───────────────────────────
  # Prerequisites on the VPS (installed via provision.yml):
  #   - Docker + docker compose
  #   - Repo checkout at $APP_DIR (for docker-compose.yml, nginx config, etc.)
  #   - .env present at $APP_DIR/.env
  #   - `docker login ghcr.io` already done (via GHCR_PULL_TOKEN in provision)
  #   - Host nginx configured
  #   - Cron job for backups installed
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # GHCR rejects uppercase names, so lowercase github.repository before
      # building the image tag. docker/metadata-action does this automatically
      # for the push step — we have to do it by hand here.
      - name: Compute image tag
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "APP_IMAGE=ghcr.io/${REPO_LC}:sha-${{ github.sha }}" >> "$GITHUB_ENV"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          APP_IMAGE: ${{ env.APP_IMAGE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_DIR,APP_IMAGE
          script: |
            set -e

            cd "$APP_DIR"

            # ── Refresh deploy artefacts only (compose file, nginx sample) ──
            # No build on the VPS — the image comes from GHCR.
            git fetch --all --prune
            git reset --hard origin/main

            # ── Persist the image tag so manual `docker compose` calls use it
            grep -q '^APP_IMAGE=' .env && sed -i "s|^APP_IMAGE=.*|APP_IMAGE=$APP_IMAGE|" .env \
                                       || echo "APP_IMAGE=$APP_IMAGE" >> .env

            # ── Pull + recreate only the app container ─────────────────────
            # postgres / redis are untouched because their image tags didn't change.
            docker compose pull app
            docker compose up -d --no-deps --force-recreate app
            docker compose up -d postgres redis   # no-op if already running

            # ── Wait for health ────────────────────────────────────────────
            for i in $(seq 1 30); do
              if docker compose ps app --format json | grep -q '"Health":"healthy"'; then
                echo "App container healthy"
                break
              fi
              echo "Waiting for app... ($i/30)"
              sleep 2
            done

            # ── Drop dangling images so the disk doesn't fill with old SHAs ─
            docker image prune -f

            # ── Reload host nginx (no-op if config unchanged) ──────────────
            sudo systemctl reload nginx || echo "nginx reload skipped"

            docker compose ps
