# TaskTracker production stack.
#
# Host responsibilities (outside Docker):
#   - nginx reverse proxy (see deploy/nginx.conf.example)
#   - TLS / certbot
#   - cron job for pg_dump (see deploy/backup.sh)
#
# Compose responsibilities:
#   - app:       Django + Channels (ASGI) + built React frontend
#   - postgres:  primary database with named volume
#   - redis:     channel layer for WebSockets (no persistence needed)
#
# The app binds to 127.0.0.1:8000 only — host nginx proxies public traffic.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tasktracker-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DATABASE_URL so the app talks to the compose postgres service,
      # not whatever .env has for local dev.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # User uploads — bind-mounted so host nginx can serve via X-Accel-Redirect
      - ./uploads:/app/uploads
      # Collected Django static (admin, DRF) — served by host nginx
      - ./staticfiles:/app/staticfiles
      # Built frontend assets — served by host nginx
      - ./frontend/task-tracker/dist:/app/frontend/task-tracker/dist
    command: >
      sh -c "uv run python manage.py migrate --no-input &&
             uv run python manage.py collectstatic --no-input &&
             uv run gunicorn config.asgi:application
               -k uvicorn.workers.UvicornWorker
               -w 3
               -b 0.0.0.0:8000
               --timeout 120
               --access-logfile -
               --error-logfile -"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/admin/login/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Not exposed to host — only reachable inside the compose network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
